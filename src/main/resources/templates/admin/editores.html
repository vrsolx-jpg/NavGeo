<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>NavGeo - Agregar Editor</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
</head>
<body class="page-admin">

<header class="admin-header">
    <div class="admin-header__brand">
        <img th:src="@{/css/images/LOGO.png}" src="/css/images/LOGO.png" alt="" aria-hidden="true">
        <div class="admin-header__brand-text">
            <span class="admin-header__brand-name">NAVGEO</span>
            <span class="admin-header__welcome">
                ¡Bienvenido <span th:text="${adminNombre}">ADMIN</span>!
            </span>
        </div>
    </div>
    <div class="admin-header__actions">
        <a th:href="@{/logout}" href="/logout" class="admin-logout-btn">Cerrar Sesión</a>
        <a th:href="@{/admin/dashboard}" href="/admin/dashboard" class="admin-back-btn">Atrás</a>
    </div>
</header>

<main class="admin-form-page">

    <div class="admin-form-title-btn">AGREGAR EDITOR</div>

    <div class="admin-card">
        <h2 class="admin-card__heading">Registrar editor autorizado</h2>

        <div class="login-alert alert-error" th:if="${errorMsg}" style="width:100%;margin-bottom:16px;">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${errorMsg}">Error</span>
        </div>

        <div class="login-alert alert-success" th:if="${successMsg}" style="width:100%;margin-bottom:16px;">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${successMsg}">Editor registrado correctamente.</span>
        </div>

        <form method="post" th:action="@{/admin/editores}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label for="nombre" class="form-label">Nombre completo</label>
                <input type="text"
                       id="nombre"
                       name="nombre"
                       class="form-control"
                       th:value="${nombreIngresado}"
                       placeholder="Ej: Editor NavGeo"
                       autocomplete="name"
                       required>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Correo autorizado</label>
                <input type="email"
                       id="email"
                       name="email"
                       class="form-control"
                       th:value="${emailIngresado}"
                       placeholder="editor@navgeo.co"
                       autocomplete="email"
                       required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       placeholder="Ingresa una contraseña segura"
                       autocomplete="new-password"
                       required>
            </div>

            <button type="submit" class="btn-subir">
                <i class="bi bi-person-plus-fill me-1"></i> Guardar editor
            </button>
        </form>

        <p class="admin-card__notice">
            El editor podrá registrar y editar rutas/paraderos, pero no podrá eliminar,
            consultar estadísticas ni registrar otros usuarios.
        </p>
    </div>

</main>

<div class="admin-wave-footer" aria-hidden="true">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,40 C240,80 480,0 720,40 C960,80 1200,0 1440,40 L1440,80 L0,80 Z"
              fill="#FFFFFF"></path>
    </svg>
</div>

<script src="/js/preferences.js"></script>
</body>
</html>
