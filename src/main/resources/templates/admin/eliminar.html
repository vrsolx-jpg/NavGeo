<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>NavGeo — Elimina</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
</head>
<body class="page-admin">

<header class="admin-header">
    <div class="admin-header__brand">
        <img th:src="@{/css/images/LOGO.png}" src="/css/images/LOGO.png" alt="" aria-hidden="true">
        <div class="admin-header__brand-text">
            <span class="admin-header__brand-name">NAVGEO</span>
            <span class="admin-header__welcome">
                ¡Bienvenido <span th:text="${adminNombre}">ADMIN</span>!
            </span>
        </div>
    </div>
    <div class="admin-header__actions">
        <a th:href="@{/logout}" href="/logout" class="admin-logout-btn">Cerrar Sesión</a>
        <a th:href="@{/admin/dashboard}" href="/admin/dashboard" class="admin-back-btn">Atrás</a>
    </div>
</header>

<main class="admin-form-page">

    <div class="admin-form-title-btn">ELIMINA</div>

    <div class="admin-card">
        <h2 class="admin-card__heading">Por favor llena la siguiente información</h2>

        <div class="admin-form-label-group">
            <span class="admin-form-label">¿Qué deseas eliminar?</span>
            <div class="admin-option-row">
                <input type="radio" id="tipo-ruta" name="tipo"
                       value="ruta" checked>
                <label for="tipo-ruta">Ruta</label>
            </div>
            <div class="admin-option-row">
                <input type="radio" id="tipo-paradero" name="tipo"
                       value="paradero">
                <label for="tipo-paradero">Paradero</label>
            </div>
            <div class="admin-option-row">
                <input type="radio" id="tipo-empleado" name="tipo"
                       value="empleado">
                <label for="tipo-empleado">Empleado</label>
            </div>
        </div>

        <div class="form-group">
            <label for="identificador" class="form-label">ID del elemento</label>
            <input type="number" id="identificador" class="form-control"
                   min="0" step="1" inputmode="numeric" pattern="[0-9]*"
                   oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                   placeholder="Ej: 1" autocomplete="off">
        </div>

        <button type="button" class="btn-subir" onclick="eliminarElemento()">
            <i class="bi bi-trash me-1"></i> Eliminar
        </button>

        <div id="msg-eliminar"
             style="margin-top:12px;font-size:13px;
                    display:none;padding:10px;border-radius:8px;"></div>

        <p class="admin-card__notice">
            Esta acción es irreversible. Verifica el ID antes de confirmar.
        </p>
    </div>

</main>

<div class="admin-wave-footer" aria-hidden="true">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none"
         xmlns="http://www.w3.org/2000/svg">
        <path d="M0,40 C240,80 480,0 720,40 C960,80 1200,0 1440,40 L1440,80 L0,80 Z"
              fill="#FFFFFF"></path>
    </svg>
</div>

<script>
    async function eliminarElemento() {
        const tipo = document.querySelector('input[name="tipo"]:checked').value;
        const id   = document.getElementById('identificador').value.trim();

        if (!id) {
            mostrarMsg('Por favor ingresa el ID del elemento.', 'error');
            return;
        }

        if (tipo === 'empleado') {
            const confirmarEmpleado = confirm(
                `¿Estás seguro de eliminar el empleado editor con ID ${id}? Esta acción es irreversible.`
            );
            if (!confirmarEmpleado) return;

            mostrarMsg('Eliminando...', 'info');
            try {
                const respuesta = await fetch(`/admin/api/editores/${id}`, { method: 'DELETE' });
                if (respuesta.ok) {
                    const data = await respuesta.json();
                    mostrarMsg(`✅ ${data.mensaje}`, 'exito');
                    document.getElementById('identificador').value = '';
                } else if (respuesta.status === 404) {
                    mostrarMsg(`No se encontró ningún empleado editor con ID ${id}.`, 'error');
                } else {
                    mostrarMsg('Error al eliminar. Intenta de nuevo.', 'error');
                }
            } catch (e) {
                mostrarMsg('Error de conexión.', 'error');
                console.error(e);
            }
            return;
        }

        const confirmar = confirm(
            `¿Estás seguro de eliminar ${tipo === 'ruta' ? 'la ruta' : 'el paradero'} con ID ${id}? Esta acción es irreversible.`
        );
        if (!confirmar) return;

        const urls = {
            ruta: `/admin/api/rutas/${id}`,
            paradero: `/admin/api/paraderos/${id}`,
            empleado: `/admin/api/editores/${id}`
        };
        const url = urls[tipo];

        mostrarMsg('Eliminando...', 'info');

        try {
            const respuesta = await fetch(url, { method: 'DELETE' });

            if (respuesta.ok) {
                const data = await respuesta.json();
                mostrarMsg(`✅ ${data.mensaje}`, 'exito');
                document.getElementById('identificador').value = '';
            } else if (respuesta.status === 404) {
                mostrarMsg(`No se encontró ningún elemento con ID ${id}.`, 'error');
            } else {
                mostrarMsg('Error al eliminar. Intenta de nuevo.', 'error');
            }
        } catch (e) {
            mostrarMsg('Error de conexión.', 'error');
            console.error(e);
        }
    }

    function mostrarMsg(texto, tipo) {
        const el = document.getElementById('msg-eliminar');
        el.style.display = 'block';
        el.textContent   = texto;
        const estilos = {
            exito: 'background:rgba(16,185,129,0.15);color:#6EE7B7;border:1px solid rgba(16,185,129,0.3)',
            error: 'background:rgba(239,68,68,0.15);color:#FCA5A5;border:1px solid rgba(239,68,68,0.3)',
            info:  'background:rgba(99,102,241,0.15);color:#C7D2FE;border:1px solid rgba(99,102,241,0.3)'
        };
        el.style.cssText += '; ' + (estilos[tipo] || estilos.info);
    }
</script>

<script src="/js/preferences.js"></script>
</body>
</html>
