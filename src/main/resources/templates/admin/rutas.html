<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>NavGeo — Registra Rutas</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
</head>
<body class="page-admin">

<header class="admin-header">
    <div class="admin-header__brand">
        <img th:src="@{/css/images/LOGO.png}" src="/css/images/LOGO.png" alt="Logo NavGeo">
        <div class="admin-header__brand-text">
            <span class="admin-header__brand-name">NAVGEO</span>
            <span class="admin-header__welcome">
                ¡Bienvenido <span th:text="${adminNombre}">ADMIN</span>!
            </span>
        </div>
    </div>

    <div class="admin-header__actions">
        <a th:href="@{/logout}" href="/logout" class="admin-logout-btn">Cerrar Sesión</a>
        <a th:href="@{/admin/dashboard}" href="/admin/dashboard" class="admin-back-btn">Atrás</a>
    </div>
</header>

<main class="admin-form-page">

    <!-- Título tipo píldora -->
    <div class="admin-form-title-btn">REGISTRA RUTAS</div>

    <!-- Card del formulario -->
    <div class="admin-card">
        <h2 class="admin-card__heading">Por favor llena la siguiente informacion</h2>

        <form method="post" th:action="@{/admin/rutas}"
              onsubmit="event.preventDefault(); alert('Endpoint POST aún no implementado en el backend.');">

            <div class="form-group">
                <label for="latitud" class="form-label">Latitud</label>
                <input type="text" id="latitud" name="latitud" class="form-control"
                       placeholder="Ej: 2.9273" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="longitud" class="form-label">Longitud</label>
                <input type="text" id="longitud" name="longitud" class="form-control"
                       placeholder="Ej: -75.2819" autocomplete="off">
            </div>

            <div class="admin-form-label-group">
                <span class="admin-form-label">Selecciona el tipo de ruta</span>

                <div class="admin-option-row">
                    <input type="checkbox" id="sentido-ida" name="sentido" value="ida">
                    <label for="sentido-ida">Ida</label>
                </div>

                <div class="admin-option-row">
                    <input type="checkbox" id="sentido-vuelta" name="sentido" value="vuelta">
                    <label for="sentido-vuelta">Vuelta</label>
                </div>
            </div>

            <button type="submit" class="btn-subir">Subir</button>

            <p class="admin-card__notice">
                Tus coordenadas se guardan de forma segura. No envíes contraseñas.
                <a href="#">Consulta cómo gestionamos tus datos</a>.
            </p>
        </form>
    </div>

</main>

<!-- Olas blancas decorativas -->
<div class="admin-wave-footer" aria-hidden="true">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,40 C240,80 480,0 720,40 C960,80 1200,0 1440,40 L1440,80 L0,80 Z"
              fill="#FFFFFF"></path>
    </svg>
</div>

</body>
</html>
