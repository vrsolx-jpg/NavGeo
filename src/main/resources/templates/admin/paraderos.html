<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>NavGeo — Registra Paraderos</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">

    <style>
        #mapa-paradero {
            width: 100%;
            height: 420px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.15);
            margin-bottom: 16px;
        }

        .color-preview {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 2px solid rgba(255,255,255,0.3);
            display: inline-block;
            vertical-align: middle;
            margin-left: 8px;
        }
    </style>
</head>
<body class="page-admin">

<header class="admin-header">
    <div class="admin-header__brand">
        <img th:src="@{/css/images/LOGO.png}" src="/css/images/LOGO.png" alt="" aria-hidden="true">
        <div class="admin-header__brand-text">
            <span class="admin-header__brand-name">NAVGEO</span>
            <span class="admin-header__welcome">
                ¡Bienvenido <span th:text="${adminNombre}">ADMIN</span>!
            </span>
        </div>
    </div>
    <div class="admin-header__actions">
        <a th:href="@{/logout}" href="/logout" class="admin-logout-btn">Cerrar Sesión</a>
        <a th:href="@{/admin/dashboard}" href="/admin/dashboard" class="admin-back-btn">Atrás</a>
    </div>
</header>

<main class="admin-form-page">

    <div class="admin-form-title-btn">REGISTRA PARADEROS</div>

    <div class="admin-card" style="max-width: 860px;">
        <h2 class="admin-card__heading">Por favor llena la siguiente información</h2>

        <!-- Nombre -->
        <div class="form-group">
            <label for="nombre-paradero" class="form-label">Nombre del paradero</label>
            <input type="text" id="nombre-paradero" class="form-control"
                   placeholder="Ej: Paradero Centro Comercial" autocomplete="off">
        </div>

        <!-- Color del marker -->
        <div class="form-group">
            <label for="color-paradero" class="form-label">
                Color del marcador
                <span class="color-preview" id="color-preview-paradero"
                      style="background:#4F46E5"></span>
            </label>
            <input type="color"
                   id="color-paradero"
                   value="#4F46E5"
                   onchange="actualizarColorParadero(this.value)"
                   style="width:60px;height:40px;border:none;
                          border-radius:8px;cursor:pointer;padding:0;">
            <span style="font-size:14px;color:#FFFFFF;margin-left:10px;"
                  id="color-hex-paradero">#4F46E5</span>
        </div>

        <!-- Buscador de lugares -->
        <div class="form-group">
            <label for="buscador-paradero" class="form-label">
                <i class="bi bi-search me-1"></i> Buscar lugar en el mapa
            </label>
            <input id="buscador-paradero"
                   type="text"
                   class="form-control"
                   aria-label="Buscar lugar en el mapa"
                   placeholder="Ej: Terminal de Transportes Neiva..."
                   autocomplete="off">
        </div>

        <!-- Instrucción -->
        <label class="form-label">
            <i class="bi bi-geo-alt me-1"></i>
            Haz clic en el mapa para ubicar el paradero
        </label>

        <div id="mapa-paradero"></div>

        <!-- Coordenadas seleccionadas -->
        <div id="coords-seleccionadas"
             style="background:rgba(255,255,255,0.12);border:1px solid
                    rgba(255,255,255,0.45);border-radius:8px;padding:10px 14px;
                    font-size:14px;color:#FFFFFF;margin-bottom:16px;">
            Haz clic en el mapa para seleccionar la ubicación del paradero.
        </div>

        <!-- Campos ocultos que guardan las coordenadas -->
        <input type="hidden" id="latitud-paradero">
        <input type="hidden" id="longitud-paradero">

        <button type="button" class="btn-subir" onclick="guardarParadero()">
            <i class="bi bi-cloud-upload me-1"></i> Guardar paradero
        </button>

        <div id="msg-estado-paradero"
             style="margin-top:12px;font-size:13px;
                    display:none;padding:10px;border-radius:8px;"></div>

        <p class="admin-card__notice">
            Haz clic exactamente sobre la ubicación del paradero en el mapa.
        </p>
    </div>

</main>

<div class="admin-wave-footer" aria-hidden="true">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,40 C240,80 480,0 720,40 C960,80 1200,0 1440,40 L1440,80 L0,80 Z"
              fill="#FFFFFF"></path>
    </svg>
</div>

<script src="/js/preferences.js"></script>
<script src="/js/admin-paraderos.js"></script>
<script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBQioA2hGEBbcoB9I98gjwL8fF-Uv8QhME&libraries=places&callback=initMapParadero&loading=async"
        async defer>
</script>

</body>
</html>
