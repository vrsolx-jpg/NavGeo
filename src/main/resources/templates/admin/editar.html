<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>NavGeo — Edita</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
</head>
<body class="page-admin">

<header class="admin-header">
    <div class="admin-header__brand">
        <img th:src="@{/css/images/LOGO.png}" src="/css/images/LOGO.png" alt="Logo NavGeo">
        <div class="admin-header__brand-text">
            <span class="admin-header__brand-name">NAVGEO</span>
            <span class="admin-header__welcome">
                ¡Bienvenido <span th:text="${adminNombre}">ADMIN</span>!
            </span>
        </div>
    </div>

    <div class="admin-header__actions">
        <a th:href="@{/logout}" href="/logout" class="admin-logout-btn">Cerrar Sesión</a>
        <a th:href="@{/admin/dashboard}" href="/admin/dashboard" class="admin-back-btn">Atrás</a>
    </div>
</header>

<main class="admin-form-page">

    <div class="admin-form-title-btn">EDITA</div>

    <div class="admin-card">
        <h2 class="admin-card__heading">Por favor llena la siguiente informacion</h2>

        <form method="post" th:action="@{/admin/editar}"
              onsubmit="event.preventDefault(); alert('Endpoint POST aún no implementado en el backend.');">

            <div class="admin-form-label-group">
                <span class="admin-form-label">¿Qué deseas editar?</span>

                <div class="admin-option-row">
                    <input type="radio" id="edit-ruta" name="tipo" value="ruta">
                    <label for="edit-ruta">Ruta</label>
                </div>

                <div class="admin-option-row">
                    <input type="radio" id="edit-paradero" name="tipo" value="paradero">
                    <label for="edit-paradero">Paradero</label>
                </div>
            </div>

            <div class="form-group">
                <label for="identificador" class="form-label">ID del elemento</label>
                <input type="text" id="identificador" name="identificador" class="form-control"
                       placeholder="Ej: 1" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="nuevo-valor" class="form-label">Nuevo valor</label>
                <input type="text" id="nuevo-valor" name="nuevoValor" class="form-control"
                       placeholder="Ingresa el nuevo valor" autocomplete="off">
            </div>

            <button type="submit" class="btn-subir">Subir</button>

            <p class="admin-card__notice">
                Los cambios se aplican de inmediato. Verifica el identificador antes
                de enviar.
            </p>
        </form>
    </div>

</main>

<div class="admin-wave-footer" aria-hidden="true">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,40 C240,80 480,0 720,40 C960,80 1200,0 1440,40 L1440,80 L0,80 Z"
              fill="#FFFFFF"></path>
    </svg>
</div>

</body>
</html>
