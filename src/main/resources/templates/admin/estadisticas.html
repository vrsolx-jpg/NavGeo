<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>NavGeo — Consulta Estadísticas</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
</head>
<body class="page-admin">

<header class="admin-header">
    <div class="admin-header__brand">
        <img th:src="@{/css/images/LOGO.png}" src="/css/images/LOGO.png" alt="" aria-hidden="true">
        <div class="admin-header__brand-text">
            <span class="admin-header__brand-name">NAVGEO</span>
            <span class="admin-header__welcome">
                ¡Bienvenido <span th:text="${adminNombre}">ADMIN</span>!
            </span>
        </div>
    </div>

    <div class="admin-header__actions">
        <a th:href="@{/logout}" href="/logout" class="admin-logout-btn">Cerrar Sesión</a>
        <a th:href="@{/admin/dashboard}" href="/admin/dashboard" class="admin-back-btn">Atrás</a>
    </div>
</header>

<main class="admin-form-page">

    <div class="admin-form-title-btn">CONSULTA ESTADISTICAS</div>

    <div class="admin-card">
        <h2 class="admin-card__heading">Resumen del sistema</h2>

        <div class="admin-option-row">
            <i class="bi bi-signpost-split-fill"></i>
            <label>Rutas registradas: <strong th:text="${totalRutas}">0</strong></label>
        </div>

        <div class="admin-option-row">
            <i class="bi bi-geo-alt-fill"></i>
            <label>Paraderos activos: <strong th:text="${totalParaderos}">0</strong></label>
        </div>

        <div class="admin-option-row">
            <i class="bi bi-activity"></i>
            <label>Estado del sistema: <strong>Activo</strong></label>
        </div>

        <p class="admin-card__notice">
            Datos en tiempo real consultados desde la base de datos. Para reportes
            detallados consulta el panel SQL de tu base de datos.
        </p>
    </div>

</main>

<div class="admin-wave-footer" aria-hidden="true">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,40 C240,80 480,0 720,40 C960,80 1200,0 1440,40 L1440,80 L0,80 Z"
              fill="#FFFFFF"></path>
    </svg>
</div>

<script src="/js/preferences.js"></script>
</body>
</html>
