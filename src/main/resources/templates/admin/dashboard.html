<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>NavGeo — Panel de Administración</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
</head>
<body class="page-admin">

<!--
    HEADER ADMIN: logo + NAVGEO + "¡Bienvenido ADMIN!" a la izquierda,
    botón "Cerrar Sesión" blanco a la derecha. Fondo verde oliva.
-->
<header class="admin-header">
    <div class="admin-header__brand">
        <img th:src="@{/css/images/LOGO.png}" src="/css/images/LOGO.png" alt="Logo NavGeo">
        <div class="admin-header__brand-text">
            <span class="admin-header__brand-name">NAVGEO</span>
            <span class="admin-header__welcome">
                ¡Bienvenido <span th:text="${adminNombre}">ADMIN</span>!
            </span>
        </div>
    </div>

    <!-- th:href preserva la ruta de logout de Spring Security -->
    <a th:href="@{/logout}" href="/logout" class="admin-logout-btn">
        <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
    </a>
</header>

<!--
    DASHBOARD: botones de acción centrados verticalmente.
    Las rutas /admin/rutas, /admin/paraderos y /admin/coordenadas se
    preservan; las nuevas (ELIMINA, CONSULTA ESTADISTICAS) apuntan a
    "#" hasta que el backend defina sus endpoints.
-->
<main class="admin-dashboard">

    <a th:href="@{/admin/rutas}"        href="/admin/rutas"        class="admin-action-btn">REGISTRA RUTAS</a>
    <a th:href="@{/admin/paraderos}"    href="/admin/paraderos"    class="admin-action-btn">REGISTRA PARADEROS</a>
    <a th:href="@{/admin/eliminar}"     href="/admin/eliminar"     class="admin-action-btn">ELIMINA</a>
    <a th:href="@{/admin/estadisticas}" href="/admin/estadisticas" class="admin-action-btn">CONSULTA ESTADISTICAS</a>
    <a th:href="@{/admin/editar}"       href="/admin/editar"       class="admin-action-btn">EDITA</a>

</main>

<!-- FOOTER admin: solo olas blancas decorativas (sin texto ni links) -->
<div class="admin-wave-footer" aria-hidden="true">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,40 C240,80 480,0 720,40 C960,80 1200,0 1440,40 L1440,80 L0,80 Z"
              fill="#FFFFFF"></path>
    </svg>
</div>

</body>
</html>
