<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>NavGeo — Mapa de Rutas · Neiva, Huila</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
</head>
<body class="page-map">

<!-- HEADER PÚBLICO: barra blanca con logo + nav -->
<header class="public-header">
    <div class="public-header__brand">
        <img th:src="@{/css/images/LOGO.png}" src="/css/images/LOGO.png" alt="Logo NavGeo">
        <span class="public-header__brand-name">NAVGEO</span>
    </div>
    <nav class="public-header__nav">
        <a href="/index.html">Inicio</a>
        <a href="#rutas" class="active">Rutas</a>
        <a href="/login">Administración</a>
    </nav>
</header>

<!-- HERO: banner con paisaje de Neiva (paisajeneiva.png) sobre la barra de búsqueda -->
<section class="hero">
    <h1 class="hero__title">CONOCE NUESTRAS RUTAS Y PARADEROS</h1>
    <p class="hero__subtitle">Transporte Público NEIVA</p>

    <div class="wave-bottom" aria-hidden="true"></div>
</section>

<!--
    SECCIÓN DE BÚSQUEDA: barra con autocompletado + pills de rutas.
    Los IDs (btn-todas, btn-ruta-NN) y la clase .route-btn se preservan
    porque map.js los usa para actualizarBotonesActivos(). El #status-text
    también es esperado por map.js.
-->
<section class="map-search-section" id="rutas">

    <div class="map-search-bar">
        <input id="map-search-input"
               type="text"
               placeholder="Buscar ruta (ej: Ruta 11)..."
               list="rutas-disponibles"
               onkeydown="if(event.key==='Enter'){event.preventDefault();buscarRuta();}">
        <datalist id="rutas-disponibles">
            <option value="Ruta 11">
            <option value="Ruta 19">
            <option value="Ruta 33">
            <option value="Ruta 60">
            <option value="Todas">
        </datalist>
        <button type="button" onclick="buscarRuta()">
            <i class="bi bi-search me-1"></i> Buscar
        </button>
    </div>

    <div class="map-route-pills">
        <button id="btn-todas" class="route-btn active"
                onclick="mostrarTodasLasRutas()">Todas</button>
        <button id="btn-ruta-11" class="route-btn"
                onclick="seleccionarRuta(1, 'Ruta 11')">Ruta 11</button>
        <button id="btn-ruta-19" class="route-btn"
                onclick="seleccionarRuta(2, 'Ruta 19')">Ruta 19</button>
        <button id="btn-ruta-33" class="route-btn"
                onclick="seleccionarRuta(3, 'Ruta 33')">Ruta 33</button>
        <button id="btn-ruta-60" class="route-btn"
                onclick="seleccionarRuta(4, 'Ruta 60')">Ruta 60</button>
    </div>

    <div class="map-status-line" id="status-text">
        <i class="bi bi-reception-4"></i> Mostrando todas las rutas activas
    </div>
</section>

<!--
    CONTENEDOR DEL MAPA REAL.
    NO MODIFICAR el div #map ni el script de Google Maps API:
    la API inyecta el mapa interactivo dentro de este div.
-->
<main class="map-main">
    <div id="map"></div>
</main>

<!-- FOOTER VERDE (mismo que el landing) -->
<!-- FOOTER VERDE (mismo que el landing) -->
<footer class="public-footer">
    <div class="public-footer__grid">

        <!-- Columna izquierda: logo + nombre -->
        <div class="public-footer__brand">
            <img th:src="@{/css/images/LOGO.png}"
                 src="/css/images/LOGO.png"
                 alt="Logo NavGeo">
            <span class="public-footer__brand-name">NAVGEO</span>
        </div>

        <!-- Columna central: contáctanos -->
        <div class="public-footer__contact">
            <h3 class="public-footer__heading">CONTÁCTANOS</h3>
            <p><i class="bi bi-envelope-fill me-2"></i>contacto@navgeo.co</p>
            <p><i class="bi bi-telephone-fill me-2"></i>+57 123-456-789</p>
            <p><i class="bi bi-geo-alt-fill me-2"></i>Neiva, Huila — Colombia</p>
        </div>

        <!-- Columna derecha: síguenos -->
        <div class="public-footer__social">
            <h3 class="public-footer__heading">SÍGUENOS</h3>
            <p>@NavGeo_</p>
            <div class="public-footer__social-icons">
                <a href="#" aria-label="Facebook">
                    <i class="bi bi-facebook"></i>
                </a>
                <a href="#" aria-label="Instagram">
                    <i class="bi bi-instagram"></i>
                </a>
                <a href="#" aria-label="X (antes Twitter)">
                    <i class="bi bi-twitter-x"></i>
                </a>
            </div>
        </div>

    </div>
</footer>
<!-- ================================================================
     SCRIPTS — map.js NO se modifica
     ================================================================ -->
<script src="/js/map.js"></script>

<!-- Wrapper inline para el campo de búsqueda. Mapea el texto del
     input a la función seleccionarRuta() que ya existe en map.js. -->
<script>
    function buscarRuta() {
        const v = document.getElementById('map-search-input').value.trim().toLowerCase();
        const mapeo = {
            'ruta 11': { id: 1, nombre: 'Ruta 11' },
            'ruta 19': { id: 2, nombre: 'Ruta 19' },
            'ruta 33': { id: 3, nombre: 'Ruta 33' },
            'ruta 60': { id: 4, nombre: 'Ruta 60' },
            '11': { id: 1, nombre: 'Ruta 11' },
            '19': { id: 2, nombre: 'Ruta 19' },
            '33': { id: 3, nombre: 'Ruta 33' },
            '60': { id: 4, nombre: 'Ruta 60' }
        };
        if (mapeo[v]) {
            seleccionarRuta(mapeo[v].id, mapeo[v].nombre);
        } else if (v === '' || v === 'todas') {
            mostrarTodasLasRutas();
        }
    }
</script>

<!--
    GOOGLE MAPS API — NO MODIFICAR.
    Carga la API con la clave inyectada por el backend (googleMapsApiKey).
    El callback initMap() está definido en map.js.
-->
<script th:if="${googleMapsApiKey != null and !googleMapsApiKey.isBlank()}"
        th:src="@{'https://maps.googleapis.com/maps/api/js'(key=${googleMapsApiKey},callback='initMap',loading='async')}"
        async defer>
</script>
<script th:if="${googleMapsApiKey == null or googleMapsApiKey.isBlank()}">
    mostrarErrorMapa("Falta configurar GOOGLE_MAPS_API_KEY para cargar Google Maps.");
</script>

</body>
</html>
