<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <!-- IMPORTANTE: Esta plataforma está optimizada exclusivamente para PC/escritorio.
         El viewport no incluye mobile-responsive breakpoints intencionalmente. -->
    <meta name="viewport" content="width=1280">
    <title>NavGeo — Rutas de Transporte Público · Neiva, Huila</title>

    <!-- Bootstrap 5: solo se usa para componentes base (botones, badges).
         El layout principal es CSS puro para control total. -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Google Fonts: Sora (display, títulos) + Inter (cuerpo UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- ================================================================
     ESTRUCTURA PRINCIPAL: Layout de 2 columnas (sidebar + mapa)
     El sidebar tiene ancho fijo; el mapa ocupa el espacio restante.
     display:flex en el body logra esto sin JavaScript.
     ================================================================ -->

<!-- SIDEBAR DE ESCRITORIO -->
<aside class="sidebar" id="sidebar">

    <!-- Encabezado / Branding -->
    <div class="sidebar-header">
        <div class="brand-icon">
            <i class="bi bi-bus-front-fill"></i>
        </div>
        <div class="brand-text">
            <h1 class="brand-title">NavGeo</h1>
            <p class="brand-subtitle">Transporte Público · Neiva</p>
        </div>
    </div>

    <!-- Divider -->
    <div class="sidebar-divider"></div>

    <!-- Selector de rutas -->
    <div class="sidebar-section">
        <p class="section-label">
            <i class="bi bi-map-fill me-1"></i> Seleccionar ruta
        </p>

        <!-- Botón: Ver todas las rutas -->
        <button class="route-btn active" id="btn-todas"
                onclick="mostrarTodasLasRutas()"
                aria-label="Ver todas las rutas">
            <span class="route-indicator" style="background:#6366f1"></span>
            <div class="route-info">
                <span class="route-name">Todas las rutas</span>
                <span class="route-desc">Vista general del sistema</span>
            </div>
            <i class="bi bi-layers-fill route-icon"></i>
        </button>

        <!-- Botón: Ruta 11 -->
        <button class="route-btn" id="btn-ruta-11"
                onclick="seleccionarRuta(1, 'Ruta 11', '#E53935')"
                aria-label="Ver Ruta 11">
            <span class="route-indicator" style="background:#E53935"></span>
            <div class="route-info">
                <span class="route-name">Ruta 11</span>
                <span class="route-desc">Las Granjas — Centro</span>
            </div>
            <i class="bi bi-arrow-right route-icon"></i>
        </button>

        <!-- Botón: Ruta 19 -->
        <button class="route-btn" id="btn-ruta-19"
                onclick="seleccionarRuta(2, 'Ruta 19', '#1E88E5')"
                aria-label="Ver Ruta 19">
            <span class="route-indicator" style="background:#1E88E5"></span>
            <div class="route-info">
                <span class="route-name">Ruta 19</span>
                <span class="route-desc">Timanco — Zona Industrial</span>
            </div>
            <i class="bi bi-arrow-right route-icon"></i>
        </button>

        <!-- Botón: Ruta 33 -->
        <button class="route-btn" id="btn-ruta-33"
                onclick="seleccionarRuta(3, 'Ruta 33', '#43A047')"
                aria-label="Ver Ruta 33">
            <span class="route-indicator" style="background:#43A047"></span>
            <div class="route-info">
                <span class="route-name">Ruta 33</span>
                <span class="route-desc">Miraflores — Terminal</span>
            </div>
            <i class="bi bi-arrow-right route-icon"></i>
        </button>

        <!-- Botón: Ruta 60 -->
        <button class="route-btn" id="btn-ruta-60"
                onclick="seleccionarRuta(4, 'Ruta 60', '#FB8C00')"
                aria-label="Ver Ruta 60">
            <span class="route-indicator" style="background:#FB8C00"></span>
            <div class="route-info">
                <span class="route-name">Ruta 60</span>
                <span class="route-desc">Sur — Hospital Universitario</span>
            </div>
            <i class="bi bi-arrow-right route-icon"></i>
        </button>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Panel de información de la ruta activa -->
    <div class="sidebar-section" id="panel-info" style="display:none;">
        <p class="section-label"><i class="bi bi-info-circle-fill me-1"></i> Información</p>
        <div class="info-card">
            <div class="info-header" id="info-nombre">Ruta 11</div>
            <p class="info-desc" id="info-descripcion">Cargando descripción...</p>
            <div class="sentido-toggle">
                <button class="sentido-btn active" id="btn-ida"
                        onclick="cambiarSentido('ida')">
                    <i class="bi bi-arrow-right-circle"></i> Ida
                </button>
                <button class="sentido-btn" id="btn-vuelta"
                        onclick="cambiarSentido('vuelta')">
                    <i class="bi bi-arrow-left-circle"></i> Vuelta
                </button>
            </div>
        </div>
    </div>

    <!-- Leyenda de paraderos -->
    <div class="sidebar-section">
        <p class="section-label"><i class="bi bi-geo-alt-fill me-1"></i> Leyenda</p>
        <div class="legend-item">
            <span class="legend-dot" style="background:#4F46E5"></span>
            <span>Paradero activo</span>
        </div>
        <div class="legend-item">
            <span class="legend-dot" style="background:#10B981"></span>
            <span>Paradero terminal</span>
        </div>
    </div>

    <!-- Footer del sidebar -->
    <div class="sidebar-footer">
        <p>Universidad Surcolombiana</p>
        <p>Proyecto de Grado · 2025</p>
    </div>
</aside>

<!-- CONTENEDOR DEL MAPA (ocupa todo el espacio restante) -->
<main class="map-wrapper">

    <!-- Barra de estado superior (sobre el mapa) -->
    <div class="map-topbar">
        <div class="map-status" id="status-text">
            <i class="bi bi-reception-4"></i>
            Mostrando todas las rutas activas
        </div>
        <a href="/login" class="admin-link" title="Acceder al panel administrativo">
            <i class="bi bi-shield-lock-fill me-1"></i> Panel Admin
        </a>
    </div>

    <!-- Contenedor del mapa de Google Maps.
         La API de Google Maps inyecta el mapa dentro de este div.
         Debe tener dimensiones explícitas (height: 100%) para renderizar. -->
    <div id="map"></div>
</main>

<!-- ================================================================
     SCRIPTS
     ================================================================ -->
<script src="/js/map.js"></script>

<!--
    GOOGLE MAPS API
    INSTRUCCIÓN: Reemplaza "TU_API_KEY_AQUI" con tu clave de la
    Google Maps JavaScript API. Obtén una en:
    https://console.cloud.google.com/google/maps-apis/

    El parámetro callback=initMap indica a la API que llame a la
    función initMap() definida en map.js cuando termine de cargarse.
    El parámetro loading=async mejora el rendimiento de carga.
-->
<script th:if="${googleMapsApiKey != null and !googleMapsApiKey.isBlank()}"
        th:src="@{'https://maps.googleapis.com/maps/api/js'(key=${googleMapsApiKey},callback='initMap',loading='async')}"
        async defer>
</script>
<script th:if="${googleMapsApiKey == null or googleMapsApiKey.isBlank()}">
    mostrarErrorMapa("Falta configurar GOOGLE_MAPS_API_KEY para cargar Google Maps.");
</script>

</body>
</html>
