<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>NavGeo — Acceso Administrativo</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
</head>
<body class="page-login">

<!-- Título grande EXTERIOR a la card (según mockup) -->
<h1 class="login-panel-title">Admin Panel</h1>

<!-- Mensajes Spring (errorMsg / logoutMsg) -->
<div class="login-alert alert-error" th:if="${errorMsg}">
    <i class="bi bi-exclamation-triangle-fill"></i>
    <span th:text="${errorMsg}">Error de autenticación.</span>
</div>

<div class="login-alert alert-success" th:if="${logoutMsg}">
    <i class="bi bi-check-circle-fill"></i>
    <span th:text="${logoutMsg}">Sesión cerrada correctamente.</span>
</div>

<!-- Card del login (blanca con borde petróleo) -->
<div class="login-card">

    <h2 class="login-card__heading">Inicia Sesión</h2>

    <!--
        FORMULARIO DE LOGIN — th:action y nombres de campos preservados
        intactos según restricciones (Spring Security espera username/password).
    -->
    <form method="post" th:action="@{/login}">

        <div class="form-group">
            <label for="username" class="form-label">Usuario*</label>
            <input type="text"
                   id="username"
                   name="username"
                   class="form-control"
                   placeholder="Ingresa tu nombre de usuario"
                   autocomplete="username"
                   required>
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Contraseña*</label>
            <input type="password"
                   id="password"
                   name="password"
                   class="form-control"
                   placeholder="••••••••••"
                   autocomplete="current-password"
                   required>
        </div>

        <button type="submit" class="btn-login-submit">Siguiente</button>
    </form>

</div>

<!-- Botón "Atrás" debajo de la card -->
<a href="/" class="btn-login-back">
    <i class="bi bi-arrow-left"></i> Atrás
</a>

</body>
</html>
